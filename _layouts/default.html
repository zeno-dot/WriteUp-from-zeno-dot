<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <a id="top"></a>

  <header class="site-header">
    <div class="wrap">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <p class="site-desc">{{ site.description }}</p>
    </div>
  </header>

  <main class="wrap content">
    {{ content }}
  </main>

  <footer class="site-footer">
    {{ site.title }} · собрано на GitHub Pages
  </footer>

  <a href="#top" class="to-top" aria-label="Наверх">↑</a>
  <div class="lightbox" id="lightbox"><img src="" alt="увеличенный скриншот"></div>

  <script>
  (function () {
    // Кликабельные скриншоты (увеличение по клику)
    var lb = document.getElementById('lightbox');
    var lbImg = lb.querySelector('img');
    document.querySelectorAll('.content img').forEach(function (img) {
      img.addEventListener('click', function () {
        lbImg.src = img.currentSrc || img.src;
        lb.classList.add('open');
      });
    });
    lb.addEventListener('click', function () { lb.classList.remove('open'); });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') lb.classList.remove('open');
    });

    // Авто-оглавление из заголовков ## (h2)
    var heads = document.querySelectorAll('.content h2');
    if (heads.length >= 2) {
      var toc = document.createElement('nav');
      toc.className = 'toc';
      toc.innerHTML = '<div class="toc-title">Содержание</div>';
      var ul = document.createElement('ul');
      heads.forEach(function (h, i) {
        if (!h.id) h.id = 'sec-' + i;
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent;
        li.appendChild(a);
        ul.appendChild(li);
      });
      toc.appendChild(ul);
      var main = document.querySelector('.content');
      main.insertBefore(toc, heads[0]);
    }

    // Кнопка «наверх» — появляется после прокрутки
    var btn = document.querySelector('.to-top');
    window.addEventListener('scroll', function () {
      if (window.scrollY > 400) btn.classList.add('show');
      else btn.classList.remove('show');
    });
  })();
  </script>
</body>
</html>
